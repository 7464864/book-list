    - id: "158625"
      type: code
      title: 文案数组拆分处理_批处理与处理
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 4320
        y: 1388.775
      parameters:
        code: |-
            /**
            将输入的文案数组按照200个长度进行拆分，生成四个独立的文案数组变量
            wenan1包含前200个，wenan2包含201-400个，以此类推
            @速创猫AI智能体版权所有
            **/
            async function main({ params }: Args): Promise<Output> {
                const ret = {
                    wenan1: [],
                    wenan2: [],
                    wenan3: [],
                    wenan4: [],
                    wenan5: []
                };

                try {
                    // 输入参数校验
                    if (!params || !params.wenan) {
                        throw new Error("缺少必要参数wenan");
                    }

                    if (!Array.isArray(params.wenan)) {
                        throw new Error("wenan参数必须是数组类型");
                    }

                    const wenanArray = params.wenan;
                    const chunkSize = 200; // 每组最大长度

                    // 拆分成四个数组
                    ret.wenan1 = wenanArray.slice(0, chunkSize);
                    ret.wenan2 = wenanArray.slice(chunkSize, chunkSize * 2);
                    ret.wenan3 = wenanArray.slice(chunkSize * 2, chunkSize * 3);
                    ret.wenan4 = wenanArray.slice(chunkSize * 3, chunkSize * 4);
                    ret.wenan5 = wenanArray.slice(chunkSize * 4, chunkSize * 5);

                } catch (error) {
                    // 异常处理，返回空数组
                    ret.wenan1 = [];
                    ret.wenan2 = [];
                    ret.wenan3 = [];
                    ret.wenan4 = [];
                    ret.wenan5 = [];
                }

                return ret;
            }
        language: 5
        node_inputs:
            - name: wenan
              input:
                type: list
                items:
                    type: string
                    value: null
                value:
                    path: Group1
                    ref_node: "139542"
