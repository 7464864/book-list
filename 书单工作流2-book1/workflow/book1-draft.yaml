      title: 合并正文音频数据
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 6360
        y: 1676.8000000000002
      parameters:
        code: "async function main({ params }: Args): Promise<Output> {\n    const ret: Output = {\n      all_timelines: [],\n      timelines: [],\n      links: []\n    };\n  \n    try {\n      // 基本合法性校验\n      if (!params || !Array.isArray(params.outputList) || params.outputList.length === 0) {\n        throw new Error(\"outputList 不能为空\");\n      }\n  \n      let offset = 0;\n  \n      for (const block of params.outputList) {\n        if (!Array.isArray(block.timelines) || !Array.isArray(block.links)) {\n          throw new Error(\"timelines 或 links 格式错误\");\n        }\n  \n        // 合并链接\n        ret.links.push(...block.links);\n  \n        for (const item of block.timelines) {\n          if (\n            typeof item.start !== \"number\" ||\n            typeof item.end !== \"number\" ||\n            item.end < item.start\n          ) {\n            throw new Error(\"timeline 数据非法\");\n          }\n  \n          const duration = item.end - item.start;\n          const newStart = ret.timelines.length === 0 ? item.start : offset;\n          const newEnd = newStart + duration;\n  \n          ret.timelines.push({ start: newStart, end: newEnd });\n          offset = newEnd;\n        }\n      }\n  \n      if (ret.timelines.length > 0) {\n        ret.all_timelines.push({\n          start: ret.timelines[0].start,\n          end: ret.timelines[ret.timelines.length - 1].end\n        });\n      }\n    } catch (err: any) {\n      ret.error = err.message ?? \"未知错误\";\n    }\n  \n    return ret;\n  }"
