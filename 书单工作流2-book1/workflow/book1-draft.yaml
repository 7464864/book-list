      parameters:
        code: "/**\n书籍介绍场景数据处理器，自动提取第二幕和第三幕时间线并处理场景数据\n@速创猫AI智能体版权所有\n关注我们，全网同名：速创猫AI智能体\n拆解文档：https://c1ga2vmd0f1.feishu.cn/wiki/EXImw8wtSiGzD3kZxEMcLvQFnCf?fromScene=spaceOverview\n**/\nasync function main({ params }: Args): Promise<Output> {\n    const ret = {\n        jingdu_scene: {\n            timelines: [],\n            ipImg: []\n        },\n        shuji_scene: {\n            scene_cap: [],\n            scene_all_timelines: [],\n            scene_cap_text_color: [],\n            scene_cap_font_size: [],\n            scene_cap_border_color: [],\n            scene_cap_transform_y: [],\n            shuji_img: []\n        },\n        author_scene: {\n            scene_all_timelines: [],\n            author_img: []\n        }\n    };\n\n    try {\n        // 输入参数校验\n        if (!params.Introduction || !Array.isArray(params.Introduction)) {\n            throw new Error(\"Introduction参数必须是数组\");\n        }\n        if (!params.IntroductionSceneIdx || !Array.isArray(params.IntroductionSceneIdx)) {\n            throw new Error(\"IntroductionSceneIdx参数必须是数组\");\n        }\n        if (params.IntroductionSceneIdx.length !== 3) {\n            throw new Error(\"IntroductionSceneIdx必须包含3个元素\");\n        }\n        if (!params.shuji_img || typeof params.shuji_img !== 'string') {\n            throw new Error(\"shuji_img参数必须是字符串\");\n        }\n        // author_img可以为空字符串，表示跳过作者场景\n\n        const introduction = params.Introduction;\n        const sceneIndexes = params.IntroductionSceneIdx;\n        const introTimelines = params.IntroductionTimelines || [];\n        \n        // 获取三个场景的索引位置\n        const jingduIndex = sceneIndexes[0];\n        const shujiIndex = sceneIndexes[1];\n        const authorIndex = sceneIndexes[2];\n        \n        // 提取第二幕时间线范围\n        let second_all_timeline = { start: 0, end: 0 };\n        if (shujiIndex > 0 && introTimelines.length > jingduIndex) {\n            const secondSceneStart = jingduIndex;\n            const secondSceneEnd = jingduIndex + shujiIndex - 1;\n            \n            if (secondSceneEnd < introTimelines.length) {\n                const firstTimeline = introTimelines[secondSceneStart];\n                const lastTimeline = introTimelines[secondSceneEnd];\n                second_all_timeline = {\n                    start: firstTimeline?.start || 0,\n                    end: lastTimeline?.end || 0\n                };\n            }\n        }\n        \n        // 提取第三幕时间线范围（只有当authorIndex > 0且有作者图片时才处理）\n        let third_all_timeline = { start: 0, end: 0 };\n        const hasAuthorImg = params.author_img && params.author_img.trim() !== \"\";\n        if (authorIndex > 0 && hasAuthorImg && introTimelines.length > jingduIndex + shujiIndex) {\n            const thirdSceneStart = jingduIndex + shujiIndex;\n            const thirdSceneEnd = jingduIndex + shujiIndex + authorIndex - 1;\n            \n            if (thirdSceneEnd < introTimelines.length) {\n                const firstTimeline = introTimelines[thirdSceneStart];\n                const lastTimeline = introTimelines[thirdSceneEnd];\n                third_all_timeline = {\n                    start: firstTimeline?.start || 0,\n                    end: lastTimeline?.end || 0\n                };\n            }\n        }\n        \n        // 处理精读场景数据\n        const jingdu_timelines: { end: number; start: number; }[] = [];\n        for (let i = 0; i < jingduIndex && i < introduction.length; i++) {\n            // 如果有时间线数据则使用，否则默认为索引值\n            jingdu_timelines.push(introTimelines[i] || { start: i, end: i + 1 });\n        }\n        \n        // 构建返回结果\n        ret.jingdu_scene = {\n            timelines: jingdu_timelines,\n            ipImg: params.ipImg ? [params.ipImg] : []\n        };\n        \n        ret.shuji_scene = {\n            scene_cap: [params.book_name || \"\", params.CoreIdea?.[0] || \"\"],\n            scene_all_timelines: [second_all_timeline, second_all_timeline],\n            scene_cap_text_color: [\"#000000\", \"#706e6d\"],\n            scene_cap_font_size: [11, 6],\n            scene_cap_border_color: [\"#ffffff\"],\n            scene_cap_transform_y: [909, 640],\n            shuji_img: [params.shuji_img]\n        };\n        \n        ret.author_scene = {\n            scene_all_timelines: hasAuthorImg && authorIndex > 0 ? [third_all_timeline] : [],\n            author_img: hasAuthorImg ? [params.author_img] : []\n        };\n        \n    } catch (error) {\n        // 异常处理，已在开头初始化默认值，这里记录错误信息\n        console.error(\"处理失败:\", error.message);\n        ret.error = error.message || \"处理场景数据时发生未知错误\";\n    }\n\n    return ret;\n}"
        language: 5
