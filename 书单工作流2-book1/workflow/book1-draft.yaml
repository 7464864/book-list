      type: code
      title: 文案分组（30个字母片段一组）
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 7740
        y: 673.7250000000005
      parameters:
        code: "/**\n* 将输入列表按每params.group_count个元素进行分组处理，生成带有序号键名的分组对象数组\n* @速创猫AI智能体版权所有\n**/\nasync function main({ params }: Args): Promise<Output> {\n    // 输入参数校验\n    if (!params || !params.wenanTimeline) {\n        throw new Error(\"输入参数 wenanTimeline 不能为空\");\n    }\n    \n    if (!Array.isArray(params.wenanTimeline)) {\n        throw new Error(\"wenanTimeline 必须是数组类型\");\n    }\n\n    try {\n        // 分组处理函数\n        function chunkList(lst) {\n            const result = [];\n            let index = 0;\n            \n            // 按每40个元素分组\n            for (let i = 0; i < lst.length; i += params.group_count) {\n                const subList = lst.slice(i, i + params.group_count);\n                // 将子列表封装成对象\n                const subObj = { wenanTimeline: subList };\n                result.push(subObj);\n                index++;\n            }\n            \n            return result;\n        }\n\n        const wenanTimeline = params.wenanTimeline;\n        const outputZuList = chunkList(wenanTimeline);\n\n        // 构建输出对象\n        const ret = {\n            wenan_groups: outputZuList\n        };\n\n        return ret;\n    } catch (error) {\n        throw new Error(`处理失败: ${error.message}`);\n    }\n}"
        language: 5
        node_inputs:
            - name: group_count
              input:
                type: integer
                value: 30
            - name: wenanTimeline
              input:
                value:
                    path: wenanTimeline
                    ref_node: "121063"
        node_outputs:
            wenan_groups:
                type: list
                items:
                    type: object
                    properties:
                        wenanTimeline:
                            type: list
                            items:
                                type: object
                                properties:
                                    content:
                                        type: string
                                        value: null
                                    end:
                                        type: integer
                                        value: null
                                    start:
                                        type: integer
                                        value: null
                                value: null
                            value: null
                    value: null
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            switch: false
            timeoutMs: 60000
