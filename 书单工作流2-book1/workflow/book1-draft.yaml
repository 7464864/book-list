    - id: "1057825"
      type: code
      title: 链接数组合并分割处理
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 5440
        y: 1676.8000000000002
      parameters:
        code: |-
            /**
            将5个输入的链接数组先合并，然后按照100个长度进行分割
            生成包含多个链接分组的数组结构
            @速创猫AI智能体版权所有
            **/
            async function main({ params }: Args): Promise<Output> {
                const ret = {
                    links_list: []
                };

                try {
                    // 输入参数校验
                    if (!params) {
                        throw new Error("缺少必要参数");
                    }

                    const { link1, link2, link3, link4, link5 } = params;

                    // 校验每个链接数组参数
                    const linkArrays = [link1, link2, link3, link4, link5];
                    linkArrays.forEach((linkArray, index) => {
                        if (!Array.isArray(linkArray)) {
                            throw new Error(`link${index + 1}参数必须是数组类型`);
                        }
                    });

                    // 合并所有链接数组
                    const mergedLinks = [...link1, ...link2, ...link3, ...link4, ...link5];

                    // 按照100个长度分割
                    const chunkSize = 100;
                    const links_list = Array.from(
                        { length: Math.ceil(mergedLinks.length / chunkSize) },
                        (_, i) => ({
                            links: mergedLinks.slice(i * chunkSize, (i + 1) * chunkSize)
                        })
                    );

                    ret.links_list = links_list;

                } catch (error) {
                    // 异常处理，返回空数组
                    ret.links_list = [];
                }

                return ret;
            }
        language: 5
        node_inputs:
