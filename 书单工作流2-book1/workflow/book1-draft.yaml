          parameters:
            code: "/**\n * 合并分镜\n * 。。。@速创猫AI智能体版权所有。。。\n **/\n  async function main({ params }: Args): Promise<Output> {\n    const ret: Output = { all_fenjing_list: [], all_kv_list: [], all_kv_texts: [] };\n  \n    try {\n      const { all_fenjing_list, curr_fenjing_list, curr_kv_list, all_kv_list,all_kv_texts } = params ?? {};\n  \n      // 输入合法性校验\n      if (!Array.isArray(all_fenjing_list)) {\n        throw new Error(\"all_fenjing_list 必须是数组\");\n      }\n      if (!Array.isArray(curr_fenjing_list)) {\n        throw new Error(\"curr_fenjing_list 必须是数组\");\n      }\n  \n      // 合并数组\n      for (const item of curr_fenjing_list) {\n        all_fenjing_list.push(item);\n      }\n\n      for (const item of curr_kv_list) {\n        all_kv_texts.push(item.keyword);\n        all_kv_list.push(item);\n      }\n  \n      ret.all_fenjing_list = all_fenjing_list;\n      ret.all_kv_list = all_kv_list;\n      ret.all_kv_texts = all_kv_texts;\n    } catch (error) {\n      // 异常抛出，供上游捕获\n      throw error;\n    }\n  \n    return ret;\n  }\n  "
