    - id: "1314371"
      type: code
      title: 中文分割字幕时间线
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 1170.3098853872311
        y: -1817.6075531879133
      parameters:
        code: "async function main({ params }: Args): Promise<Output> {\n    const users = params.shijianx;\n    const captions = params.zimu;\n\n    // 验证输入数据长度匹配\n    if (users.length !== captions.length) {\n        throw new Error(\"时间线数量与字幕数量不匹配\");\n    }\n\n    const processedSubtitles = [];\n    const processedTimelines = [];\n\n    // 处理每一条字幕及其对应的时间线\n    for (let i = 0; i < captions.length; i++) {\n        const caption = captions[i];\n        const timeline = users[i];\n        const duration = timeline.end - timeline.start;\n        \n        // 按逗号分割字幕\n        const parts = caption.split(/[，,？。！]/).filter(part => part.trim() !== '');\n        \n        if (parts.length === 0) continue;\n        \n        if (parts.length === 1) {\n            // 未分割的字幕，直接使用原始时间线\n            processedSubtitles.push(parts[0].trim());\n            processedTimelines.push({\n                start: timeline.start,\n                end: timeline.end\n            });\n        } else {\n            // 分割后的字幕，按字符数比例分配时间\n            const totalChars = parts.reduce((sum, part) => sum + part.length, 0);\n            let currentStart = timeline.start;\n            \n            parts.forEach(part => {\n                const partChars = part.length;\n                const partDuration = Math.round(duration * (partChars / totalChars));\n                const partEnd = currentStart + partDuration;\n                \n                processedSubtitles.push(part.trim());\n                processedTimelines.push({\n                    start: currentStart,\n                    end: partEnd\n                });\n                \n                currentStart = partEnd;\n            });\n            \n            // 修正最后一个片段的结束时间，确保与原始时间线一致\n            if (processedTimelines.length > 0) {\n                const lastIndex = processedTimelines.length - 1;\n                processedTimelines[lastIndex].end = timeline.end;\n            }\n        }\n    }\n\n    return {\n        text_timelines: processedTimelines,\n        text_cap: processedSubtitles\n    };\n}"
        language: 5
        node_inputs:
            - name: shijianx
              input:
                value:
                    path: timelines
                    ref_node: "113324"
            - name: zimu
              input:
                value:
                    path: key1
                    ref_node: "156921"
        node_outputs:
            text_cap:
                type: list
                items:
                    type: string
                    value: null
                value: null
            text_timelines:
                type: list
                items:
                    type: object
                    properties:
                        end:
                            type: integer
                            value: null
                        start:
                            type: integer
                            value: null
                    value: null
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            switch: false
            timeoutMs: 60000
