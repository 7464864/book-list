      parameters:
        code: "// 在这里，您可以通过 ‘params’  获取节点中的输入变量，并通过 'ret' 输出结果\n// 'params' 和 'ret' 已经被正确地注入到环境中\n// 下面是一个示例，获取节点输入中参数名为‘input’的值：\n// const input = params.input; \n// 下面是一个示例，输出一个包含多种数据类型的 'ret' 对象：\n// const ret = { \"name\": ‘小明’, \"hobbies\": [“看书”, “旅游”] };\n\nasync function main({ params }: Args): Promise<Output> {\n    // 检查输入是否存在且为字符串\n    if (!params || typeof params.input !== 'string') {\n        throw new Error('Invalid input: input must be a string containing URLs');\n    }\n\n    // 分割URL字符串为数组（处理中文逗号）\n    const urlList = params.input.split('，');\n    \n    // 检查URL数量是否足够\n    if (urlList.length < 10) {\n        throw new Error(`Only ${urlList.length} URLs available, need at least 10`);\n    }\n\n    // 生成随机索引（Fisher-Yates洗牌算法）\n    const shuffledUrls = [...urlList].sort(() => Math.random() - 0.5);\n    \n    // 提取前10个随机URL并拼接为指定格式\n    const randomUrls = shuffledUrls.slice(0, 10).join('，');\n\n    return {\n        key0: randomUrls\n    };\n}"
