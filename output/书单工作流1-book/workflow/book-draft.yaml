      parameters:
        code: "// 在这里，您可以通过 ‘params’  获取节点中的输入变量，并通过 'ret' 输出结果\n// 'params' 和 'ret' 已经被正确地注入到环境中\n// 下面是一个示例，获取节点输入中参数名为‘input’的值：\n// const input = params.input; \n// 下面是一个示例，输出一个包含多种数据类型的 'ret' 对象：\n// const ret = { \"name\": ‘小明’, \"hobbies\": [“看书”, “旅游”] };\n\nasync function main({ params }: Args): Promise<Output> {\n\n    // 1. 创建 params.fm_list 的浅副本 (shallow copy) 以避免直接修改 params\n    //    这里使用扩展运算符 (...) 来创建副本\n    const newList = [...params.fm_list];\n\n    // 2. 在副本 (newList) 上执行 splice 操作\n    //    在索引为 3 的位置插入 params.activedFm，不删除任何元素 (0)\n    newList.splice(3, 0, params.activedFm);\n\n    // 3. 构建输出对象，使用修改后的副本 newList\n    const ret = {\n       fm_list: newList\n    };\n\n    // 4. 返回包含新列表的对象\n    return ret;\n}"
