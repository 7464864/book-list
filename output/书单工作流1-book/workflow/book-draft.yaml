      parameters:
        code: |-
            async function main({ params }: Args): Promise<Output> {
                // 直接使用原始数组，不移除任何元素
                const wenan = params.wenan;
                const timelines = params.timelines;

                // 构建输出对象，将文本和时间线合并
                const ret = {
                    wenanTimeline: wenan.map((item, idx) => ({
                        content: item,                          // 文本内容
                        start: timelines[idx].start + params.end,            // 开始时间
                        end: timelines[idx].end + params.end                // 结束时间
                    }))
                };

                return ret;
            }
