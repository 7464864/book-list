        - id: "287201"
          type: code
          title: 视频配图统一数据结构
          icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
          description: "编写代码，处理输入变量来生成返回值"
          version: v2
          position:
            x: 180
            y: 0
          parameters:
            code: "async function main({ params }: Args): Promise<Output> {\n    // 从 params 中获取当前项、索引和完整列表\n    const currentItem = params.fm_item;\n    const currentIndex = params.idx;\n    const fullList = params.var_fm_list;\n    const totalItems = fullList.length;\n    \n    // 获取时间轴信息并设置默认值\n    const preTimeline = params.pre_timeline || { start: 0, end: 100 };\n    const secondMp3Timeline = params.second_mp3_timeline || { start: 70, end: 100 };\n    \n    // 安全地计算 second_mp3_timeline.start 在 pre_timeline 中的相对位置（百分比）\n    let secondMp3RelativeStart = 70; // 默认值为70%\n    \n    // 确保 preTimeline 和 secondMp3Timeline 都有效\n    if (preTimeline && secondMp3Timeline && \n        typeof preTimeline.start === 'number' && \n        typeof preTimeline.end === 'number' &&\n        typeof secondMp3Timeline.start === 'number') {\n      \n      const totalDuration = preTimeline.end - preTimeline.start;\n      \n      // 避免除以零错误\n      if (totalDuration > 0) {\n        secondMp3RelativeStart = Math.min(\n          Math.max(\n            ((secondMp3Timeline.start - preTimeline.start) / totalDuration) * 100,\n            0\n          ),\n          100\n        );\n      }\n    }\n  \n    // --- 计算初始 transform_x ---\n    const lastItemTransformX = 1400; // 最后一个 fm 的 transform_x 值\n    const spacing = 900; // 每个 fm 之间的间距\n  \n    // 计算当前项距离最后一项有多少个\"身位\"\n    const distanceFromLast = (totalItems - 1) - currentIndex;\n  \n    // 计算当前项的初始 transform_x\n    const calculated_transform_x = lastItemTransformX - (distanceFromLast * spacing);\n  \n    // --- 优化的关键帧动画设置 ---\n    // 增加更多节点以实现更丝滑的动画\n    const offsets = \"0|5|15|20|35|45|50|55|60|65|70|85|100\";\n    \n    // 计算各阶段的 transform_x 值\n    let values = \"\";\n    \n    // 初始位置(0%)\n    let initialValue = calculated_transform_x;\n    \n    // 计算第一本书居中时的各元素位置\n    const firstBookInitial = lastItemTransformX - ((totalItems - 1) * spacing);\n    const offsetToFirstBook = firstBookInitial;\n    \n    // 计算第三本书居中时的各元素位置\n    const thirdBookInitial = lastItemTransformX - ((totalItems - 1 - 2) * spacing);\n    const offsetToThirdBook = thirdBookInitial;\n    \n    // 计算第四本书居中时的各元素位置\n    const fourthBookInitial = lastItemTransformX - ((totalItems - 1 - 3) * spacing);\n    const offsetToFourthBook = fourthBookInitial;\n    \n    // 第一阶段：向第一本书居中过渡\n    // 缓慢开始(5%)\n    const easeInValue = calculated_transform_x - (offsetToFirstBook * 0.1);\n    \n    // 加速阶段(15%)\n    const accelerateValue = calculated_transform_x - (offsetToFirstBook * 0.7);\n    \n    // 第一本书居中(20%)\n    let book1CenteredValue;\n    if (currentIndex === 0) {\n      book1CenteredValue = 0;\n    } else {\n      book1CenteredValue = calculated_transform_x - offsetToFirstBook;\n    }\n    \n    // 开始向第三本书过渡(35%) - 加速\n    const transitionToBook3Start = book1CenteredValue + \n      ((currentIndex === 2 ? 0 : calculated_transform_x - offsetToThirdBook) - book1CenteredValue) * 0.4;\n    \n    // 接近第三本书(45%) - 减速\n    const transitionToBook3End = book1CenteredValue + \n      ((currentIndex === 2 ? 0 : calculated_transform_x - offsetToThirdBook) - book1CenteredValue) * 0.9;\n    \n    // 第三本书居中(50%)\n    let book3CenteredValue;\n    if (currentIndex === 2) {\n      book3CenteredValue = 0;\n    } else {\n      book3CenteredValue = calculated_transform_x - offsetToThirdBook;\n    }\n    \n    // 保持第三本书居中(55%) - 与50%相同\n    const holdBook3 = book3CenteredValue;\n    \n    // 开始向第四本书过渡(60%) - 快速加速\n    const transitionToBook4Start = book3CenteredValue + \n      ((currentIndex === 3 ? 0 : calculated_transform_x - offsetToFourthBook) - book3CenteredValue) * 0.2;\n    \n    // 快速移动中(65%)\n    const transitionToBook4Mid = book3CenteredValue + \n      ((currentIndex === 3 ? 0 : calculated_transform_x - offsetToFourthBook) - book3CenteredValue) * 0.8;\n    \n    // 第四本书居中(70%)\n    let book4CenteredValue;\n    if (currentIndex === 3) {\n      book4CenteredValue = 0;\n    } else {\n      book4CenteredValue = calculated_transform_x - offsetToFourthBook;\n    }\n    \n    // 微调位置(85%) - 可能有轻微的弹性效果\n    const finetuneValue = book4CenteredValue + (currentIndex === 3 ? 0 : Math.random() * 5 - 2.5);\n    \n    // 最终稳定位置(100%)\n    const finalValue = book4CenteredValue;\n    \n    // 拼接关键帧值\n    values = `${initialValue}|${easeInValue}|${accelerateValue}|${book1CenteredValue}|${transitionToBook3Start}|${transitionToBook3End}|${book3CenteredValue}|${holdBook3}|${transitionToBook4Start}|${transitionToBook4Mid}|${book4CenteredValue}|${finetuneValue}|${finalValue}`;\n  \n    // --- 确定要聚焦的封面索引 ---\n    const focusBookIndex = 3; // 第四本书\n    \n    // 构建关键帧动画\n    let keyframe1 = {};\n    \n    // 计算过渡结束时间点（确保不会是NaN）\n    const transitionEndPoint = secondMp3RelativeStart + 5;\n    \n    // 确保关键帧值在合法范围内\n    // 对于透明度，值必须在0-1范围内\n    \n    // 焦点封面应用放大效果，非焦点封面应用透明度效果\n    if (currentIndex === focusBookIndex) {\n      // 焦点封面：添加放大效果\n      keyframe1 = {\n        ctype: \"UNIFORM_SCALE\", // 均匀缩放\n        offsets: `0|${secondMp3RelativeStart}|${transitionEndPoint}|100`,\n        values: \"0.5|0.5|0.8|0.85\" // 从正常大小放大到1.2倍\n      };\n    } else {\n      // 非焦点封面：添加透明度变化\n      keyframe1 = {\n        ctype: \"KFTypeAlpha\", // 透明度\n        offsets: `0|${secondMp3RelativeStart}|${transitionEndPoint}|100`,\n        values: \"1|1|0|0\" // 从完全不透明变为0.3透明度\n      };\n    }\n  \n    // 构建输出对象\n    const ret = {\n      \"imgs\": [currentItem],\n      \"otherInfos\": {\n        transform_x: calculated_transform_x,\n        // 位置移动关键帧\n        keyframe: {\n          ctype: \"KFTypePositionX\",\n          offsets: offsets,\n          values: values,\n        },\n        // 根据是否为焦点封面，添加放大或透明度效果\n        keyframe1: keyframe1\n      }\n    };\n  \n    return ret;\n  }"
            language: 5
            node_inputs:
                - name: idx
                  input:
                    type: integer
                    value:
                        path: index
                        ref_node: "354613"
                - name: fm_item
                  input:
                    type: string
                    value:
                        path: fm_list
                        ref_node: "354613"
                - name: var_fm_list
                  input:
                    type: list
                    items:
                        type: string
                        value: null
                    value:
                        path: var_fm_list
                        ref_node: "354613"
                - name: pre_timeline
                  input:
                    value:
                        path: pre_timeline
                        ref_node: "114173"
                - name: second_mp3_timeline
                  input:
                    value:
                        path: second_mp3_timeline
                        ref_node: "114173"
            node_outputs:
                imgs:
                    type: list
                    items:
                        type: string
                        value: null
                    value: null
                otherInfos:
                    type: object
                    properties:
                        alignment:
                            type: integer
                            value: null
                        border_color:
                            type: string
                            value: null
                        in_animation:
                            type: string
                            value: null
                        in_animation_duratio:
                            type: integer
                            value: null
                        keyframe:
                            type: object
                            properties:
                                ctype:
                                    type: string
                                    value: null
                                offsets:
                                    type: string
                                    value: null
                                values:
                                    type: string
                                    value: null
                            value: null
                        keyframe1:
                            type: object
                            properties:
                                ctype:
                                    type: string
                                    value: null
                                offsets:
                                    type: string
                                    value: null
                                values:
                                    type: string
                                    value: null
                            value: null
                        loop_animation:
                            type: string
                            value: null
                        loop_animation_durat:
                            type: integer
                            value: null
                        out_animation:
                            type: string
                            value: null
                        out_animation_durati:
                            type: integer
                            value: null
                        transform_x:
                            type: float
                            value: null
                        transform_y:
                            type: float
                            value: null
                    value: null
            settingOnError:
                processType: 1
                retryTimes: 0
                switch: false
                timeoutMs: 60000
      edges:
        - source_node: "287201"
          target_node: "501302"
